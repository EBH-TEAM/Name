<body>
<div class="main-card">

    <div class="content">

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
    // Update datetime
    function updateDateTime() {
        const now = new Date();
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' };
        document.getElementById('datetime').textContent = now.toLocaleDateString('en-US', options);
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // Base32 decoding function
    function base32Decode(base32) {
        const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
        base32 = base32.replace(/\s+/g, '').replace(/=+$/, '').toUpperCase();
        
        let bits = 0;
        let value = 0;
        let output = [];
        
        for (let i = 0; i < base32.length; i++) {
            const char = base32[i];
            const index = alphabet.indexOf(char);
            
            if (index === -1) {
                throw new Error('Invalid Base32 character');
            }
            
            value = (value << 5) | index;
            bits += 5;
            
            if (bits >= 8) {
                output.push((value >>> (bits - 8)) & 0xFF);
                bits -= 8;
            }
        }
        
        return new Uint8Array(output);
    }

    // TOTP generation function
    function generateTOTP(secret) {
        try {
            const key = base32Decode(secret);
            const keyWA = CryptoJS.lib.WordArray.create(key);
            const timeStep = 30;
            const counter = Math.floor(Date.now() / 1000 / timeStep);
            const counterBytes = new ArrayBuffer(8);
            const counterView = new DataView(counterBytes);
            counterView.setUint32(4, counter);
            const counterWA = CryptoJS.lib.WordArray.create(new Uint8Array(counterBytes));
            const hmac = CryptoJS.HmacSHA1(counterWA, keyWA);
            const hmacHex = hmac.toString(CryptoJS.enc.Hex);
            const offset = parseInt(hmacHex.substr(39, 1), 16) * 2;
            const otpHex = hmacHex.substr(offset, 8);
            let otp = parseInt(otpHex, 16) & 0x7FFFFFFF;
            otp = otp % 1000000;
            return otp.toString().padStart(6, '0');
        } catch (e) {
            console.error('Error:', e);
            throw new Error('Invalid 2FA key');
        }
    }

    let currentSecret = '';
    let timerInterval = null;

    function updateCode() {
        if (!currentSecret) {
            document.getElementById("codeDisplay").textContent = '------';
            return;
        }
        try {
            const code = generateTOTP(currentSecret);
            document.getElementById("codeDisplay").textContent = code;
            // Auto copy to clipboard
            navigator.clipboard.writeText(code).then(() => {
                // Optional: show copied feedback
                const display = document.getElementById("codeDisplay");
                display.style.transform = 'scale(0.98)';
                setTimeout(() => display.style.transform = 'scale(1)', 100);
            }).catch(() => {});
        } catch (err) {
            document.getElementById("codeDisplay").textContent = 'INVALID';
        }
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        
        function updateTimer() {
            const now = Math.floor(Date.now() / 1000);
            const remaining = 30 - (now % 30);
            const percentage = (remaining / 30) * 100;
            document.getElementById("timerBar").style.width = percentage + '%';
            document.getElementById("timerText").textContent = `⏱️ Next refresh in ${remaining} seconds`;
            
            if (remaining <= 1) {
                updateCode();
            }
        }
        
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function generateAndCopy() {
        const input = document.getElementById("twofa");
        currentSecret = input.value.trim();
        
        if (!currentSecret) {
            alert("❌ Please enter a valid 2FA secret key");
            return;
        }
        
        updateCode();
        startTimer();
    }

    function clearAll() {
        document.getElementById("twofa").value = '';
        document.getElementById("codeDisplay").textContent = '------';
        document.getElementById("timerBar").style.width = '0%';
        document.getElementById("timerText").textContent = 'Ready';
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = null;
        currentSecret = '';
    }

    function checkAndUpdateOnType() {
        const secret = document.getElementById("twofa").value.trim();
        if (secret.length >= 16) {
            currentSecret = secret;
            updateCode();
            startTimer();
        } else if (secret.length === 0) {
            clearAll();
        }
    }

    // Event listeners
    document.getElementById("generateBtn").addEventListener('click', generateAndCopy);
    document.getElementById("clearBtn").addEventListener('click', clearAll);
    document.getElementById("twofa").addEventListener('input', checkAndUpdateOnType);

    // Auto-update every second for time display
    setInterval(() => {
        if (currentSecret) {
            const now = Math.floor(Date.now() / 1000);
            const remaining = 30 - (now % 30);
            if (remaining === 30 || remaining === 0) {
                updateCode();
            }
        }
    }, 1000);
</script>
