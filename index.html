<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script>
    (function() {
        // ======================== TOAST FUNCTION ========================
        function showToast(msg) {
            let toast = document.getElementById('liveToast');
            toast.style.opacity = '1';
            toast.innerText = msg;
            setTimeout(() => toast.style.opacity = '0', 1800);
        }

        // ======================== 2FA TOTP সিস্টেম (ক্লিয়ার বাটন নেই, শুধু পেস্ট + অটো ক্লিয়ার) ========================
        let currentSecret = '';
        let timerInterval = null;
        let autoClearTimeout = null;

        function base32Decode(base32) {
            const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
            base32 = base32.replace(/\s+/g, '').replace(/=+$/, '').toUpperCase();
            let bits = 0, value = 0, output = [];
            for (let i = 0; i < base32.length; i++) {
                const index = alphabet.indexOf(base32[i]);
                if (index === -1) throw new Error('Invalid Base32');
                value = (value << 5) | index;
                bits += 5;
                if (bits >= 8) {
                    output.push((value >>> (bits - 8)) & 0xFF);
                    bits -= 8;
                }
            }
            return new Uint8Array(output);
        }

        function generateTOTP(secret) {
            try {
                const key = base32Decode(secret);
                const keyWA = CryptoJS.lib.WordArray.create(key);
                const counter = Math.floor(Date.now() / 1000 / 30);
                const counterBytes = new ArrayBuffer(8);
                const counterView = new DataView(counterBytes);
                counterView.setUint32(4, counter);
                const counterWA = CryptoJS.lib.WordArray.create(new Uint8Array(counterBytes));
                const hmac = CryptoJS.HmacSHA1(counterWA, keyWA);
                const hmacHex = hmac.toString(CryptoJS.enc.Hex);
                const offset = parseInt(hmacHex.substr(39, 1), 16) * 2;
                const otpHex = hmacHex.substr(offset, 8);
                let otp = parseInt(otpHex, 16) & 0x7FFFFFFF;
                otp = otp % 1000000;
                return otp.toString().padStart(6, '0');
            } catch(e) {
                return 'ERROR';
            }
        }

        function updateOtpDisplay() {
            if (!currentSecret || currentSecret === '') {
                document.getElementById('otpDisplay').textContent = '------';
                return;
            }
            const code = generateTOTP(currentSecret);
            if (code !== 'ERROR') {
                document.getElementById('otpDisplay').textContent = code;
                // অটো কপি (কার্ডে লেখা অনুযায়ী)
                navigator.clipboard.writeText(code).catch(e => console.warn);
                const otpEl = document.getElementById('otpDisplay');
                otpEl.style.transform = 'scale(0.97)';
                setTimeout(() => otpEl.style.transform = 'scale(1)', 120);
            } else {
                document.getElementById('otpDisplay').textContent = 'ERROR';
            }
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            function tick() {
                if (!currentSecret) {
                    document.getElementById('timerBar').style.width = '0%';
                    return;
                }
                const now = Math.floor(Date.now() / 1000);
                const remaining = 30 - (now % 30);
                const percent = (remaining / 30) * 100;
                document.getElementById('timerBar').style.width = percent + '%';
                if (remaining === 30 || remaining === 29 || remaining === 1) updateOtpDisplay();
            }
            tick();
            timerInterval = setInterval(tick, 1000);
        }

        // সিক্রেট সেট করার ফাংশন (ইনপুট ভ্যালু থেকে)
        function setSecretFromInput(value) {
            const trimmed = value.trim();
            if (trimmed === '') {
                currentSecret = '';
                document.getElementById('otpDisplay').textContent = '------';
                document.getElementById('timerBar').style.width = '0%';
                return;
            }
            currentSecret = trimmed;
            updateOtpDisplay();
            startTimer();
        }

        // পেস্ট বাটনের কাজ: ক্লিপবোর্ড থেকে টেক্সট পড়ে ইনপুটে সেট করে, তারপর 2 সেকেন্ড পর ইনপুট ক্লিয়ার করে
        async function pasteAndAutoClear() {
            try {
                const text = await navigator.clipboard.readText();
                if (!text || text.trim() === '') {
                    showToast("⚠️ ক্লিপবোর্ড খালি");
                    return;
                }
                const inputField = document.getElementById('twofaKey');
                inputField.value = text.trim();
                // সিক্রেট সেট করুন
                setSecretFromInput(text.trim());
                showToast("🔑 OTP সিক্রেট পেস্ট করা হয়েছে, ২ সেকেন্ড পর ইনপুট ক্লিয়ার হবে");
                
                // আগের টাইমআউট ক্লিয়ার করে নতুন সেট
                if (autoClearTimeout) clearTimeout(autoClearTimeout);
                autoClearTimeout = setTimeout(() => {
                    const inp = document.getElementById('twofaKey');
                    if (inp) {
                        inp.value = '';
                        // কিন্তু currentSecret যেন রিসেট না হয়! শুধু ইনপুট বক্স খালি করবে, সিক্রেট থাকবে OTp চলতে থাকবে।
                        // ব্যবহারকারী পরবর্তীতে নতুন পেস্ট করলে ওভাররাইট হবে। ঠিক আছে।
                        showToast("🧹 ইনপুট বক্স ক্লিয়ার করা হয়েছে (সিক্রেট সক্রিয় আছে)");
                    }
                    autoClearTimeout = null;
                }, 2000);
            } catch(err) {
                showToast("❌ ক্লিপবোর্ড পড়া যায়নি, অনুমতি দিন");
            }
        }

        // ক্লাসিক্যাল ইনপুট ইভেন্ট হ্যান্ডলার (লিখলে বা ম্যানুয়ালি পেস্ট করলেও কাজ)
        const twofaInput = document.getElementById('twofaKey');
        twofaInput.addEventListener('input', (e) => {
            if (autoClearTimeout) clearTimeout(autoClearTimeout);
            setSecretFromInput(e.target.value);
        });
        
        // পেস্ট বাটন ইভেন্ট যোগ
        document.getElementById('pasteOtpBtn').addEventListener('click', pasteAndAutoClear);

        // ======================== পাসওয়ার্ড জেনারেটর ========================
        function getRandomLetter() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            return letters.charAt(Math.floor(Math.random() * letters.length));
        }
        function getRandomChar(set) {
            return set.charAt(Math.floor(Math.random() * set.length));
        }
        function generatePassword() {
            const lower = 'abcdefghijklmnopqrstuvwxyz';
            const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const digits = '0123456789';
            const special = '!@#$%^&*()_+~`|}{[]\\:;?><,./-=';
            let password = getRandomLetter();
            const allChars = lower + upper + digits + special;
            for (let i = 0; i < 9; i++) password += getRandomChar(allChars);
            let arr = password.split('');
            let first = arr[0];
            let rest = arr.slice(1);
            for (let i = rest.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [rest[i], rest[j]] = [rest[j], rest[i]];
            }
            password = first + rest.join('');
            const today = new Date();
            const day = today.getDate().toString().padStart(2, '0');
            password += day;
            return password;
        }

        let currentPassword = '';
        function updatePassword() {
            currentPassword = generatePassword();
            document.getElementById('passwordDisplay').textContent = currentPassword;
        }

        function copyPassword() {
            if (currentPassword && currentPassword !== '••••••••') {
                navigator.clipboard.writeText(currentPassword);
                showToast("📋 পাসওয়ার্ড কপি হয়েছে");
            }
        }

            } else {
                // প্রথমবার রেন্ডম সেট
                currentName = getRandomNameFromList();
                document.getElementById('nameDisplay').textContent = currentName;
                localStorage.setItem(STORED_NAME_KEY, currentName);
            }
        }
        
        function updateRandomName() {
            // "চেঞ্জ" বাটন ক্লিক করলে মাঝখান থেকে সম্পূর্ণ নতুন রেন্ডম নাম নিবে
            const newName = getRandomNameFromList();
            currentName = newName;
            document.getElementById('nameDisplay').textContent = currentName;
            localStorage.setItem(STORED_NAME_KEY, currentName);
            showToast("✨ নতুন রেন্ডম নাম সেট করা হয়েছে (স্থায়ী)");
        }
        
        function copyName() {
            if (currentName && currentName !== 'নাম দেখাবে') {
                navigator.clipboard.writeText(currentName);
                showToast("📋 নাম কপি হয়েছে");
            }
        }
        
        // ======================== ইভেন্ট লিসেনার ========================
        document.getElementById('changePassBtn').addEventListener('click', () => {
            updatePassword();
            showToast("🔁 নতুন পাসওয়ার্ড তৈরি হয়েছে");
        });
        document.getElementById('copyPassBtn').addEventListener('click', copyPassword);
        document.getElementById('changeNameBtn').addEventListener('click', updateRandomName);
        document.getElementById('copyNameBtn').addEventListener('click', copyName);
        
        // ======================== ডেট-টাইম ========================
        function updateDateTime() {
            const now = new Date();
            document.getElementById('datetime').innerText = now.toLocaleString('bn-BD');
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();
        
        // শুরুতে পাসওয়ার্ড এবং নাম লোড/ইনিট
        updatePassword();            // পাসওয়ার্ড ফ্রেশ
        loadOrInitName();            // নাম লোড (পেজ রিলোডে একই থাকে)
        
        // টাইমার 2fa এর জন্য (যদি আগে কোন সিক্রেট থাকে তবে তা অবশ্যই চলবে, কিন্তু শুরুতে খালি)
        startTimer();
        
        console.log("✅ সম্পূর্ণ আপডেট | OTP পেস্ট বাটন & ২ সেকেন্ড পর ইনপুট ক্লিয়ার | নাম স্থায়ী (রিফ্রেশে একই) | চেঞ্জ বাটনে মাঝখান থেকে রেন্ডম");
    })();
</script>
</body>
</html>
