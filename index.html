    function getRandomLetter() {

    function getRandomCharFromSet(set) {

    function generateSecurePassword() {
        const lower = 'abcdefghijklmnopqrstuvwxyz';
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const digits = '0123456789';
        const special = '!@#$%^&*()_+~`|}{[]\\:;?><,./-=';

        // First character MUST be a letter
        let password = getRandomLetter(); 

        const remainingLength = 10; // total base length will be 10 (first + 9 more)
        let charsetAll = lower + upper + digits + special;

        for (let i = 0; i < remainingLength - 1; i++) {
            password += getRandomCharFromSet(charsetAll);
        }

        // Shuffle only the part after the first character (first letter stays at position 0)
        let arr = password.split('');
        let firstChar = arr[0];
        let rest = arr.slice(1);
        for (let i = rest.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [rest[i], rest[j]] = [rest[j], rest[i]];
        }
        let shuffledPassword = firstChar + rest.join('');

        // Add today's date (2 digits)
        const today = new Date();
        const day = today.getDate().toString().padStart(2, '0');
        const finalPassword = shuffledPassword + day;
        
        return finalPassword;
    }
